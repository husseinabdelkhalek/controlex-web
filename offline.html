<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>غير متصل - controlex</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Tajawal', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            direction: rtl;
            text-align: center;
            color: white;
        }
        
        .offline-container {
            max-width: 500px;
            padding: 40px 20px;
        }
        
        .offline-icon {
            font-size: 5rem;
            margin-bottom: 20px;
            opacity: 0.8;
        }
        
        .offline-title {
            font-size: 2rem;
            margin-bottom: 15px;
            font-weight: 700;
        }
        
        .offline-message {
            font-size: 1.1rem;
            margin-bottom: 30px;
            opacity: 0.9;
            line-height: 1.6;
        }
        
        .retry-btn {
            background: rgba(255, 255, 255, 0.2);
            border: 2px solid rgba(255, 255, 255, 0.3);
            color: white;
            padding: 15px 30px;
            border-radius: 25px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            backdrop-filter: blur(10px);
        }
        
        .retry-btn:hover {
            background: rgba(255, 255, 255, 0.3);
            border-color: rgba(255, 255, 255, 0.5);
            transform: translateY(-2px);
        }
        
        .offline-tips {
            margin-top: 40px;
            text-align: right;
            opacity: 0.8;
        }
        
        .offline-tips h3 {
            font-size: 1.2rem;
            margin-bottom: 15px;
        }
        
        .offline-tips ul {
            list-style: none;
            padding: 0;
        }
        
        .offline-tips li {
            margin-bottom: 8px;
            padding-right: 20px;
            position: relative;
        }
        
        .offline-tips li::before {
            content: '•';
            position: absolute;
            right: 0;
            color: rgba(255, 255, 255, 0.6);
        }
    </style>
</head>
<body>
    <div class="offline-container">
        <div class="offline-icon">📡</div>
        <h1 class="offline-title">غير متصل بالإنترنت</h1>
        <p class="offline-message">
            يبدو أن اتصالك بالإنترنت منقطع. تحقق من اتصالك وحاول مرة أخرى.
        </p>
        
        <button class="retry-btn" onclick="window.location.reload()">
            إعادة المحاولة
        </button>
        
        <div class="offline-tips">
            <h3>نصائح لحل المشكلة:</h3>
            <ul>
                <li>تحقق من اتصالك بالواي فاي أو بيانات الهاتف</li>
                <li>تأكد من أن الراوتر يعمل بشكل صحيح</li>
                <li>جرب فتح موقع آخر للتأكد من الاتصال</li>
                <li>أعد تشغيل المتصفح أو الجهاز</li>
            </ul>
        </div>
    </div>
    
    <script>
        // Check for connectivity and auto-reload
        window.addEventListener('online', function() {
            window.location.reload();
        });
        
        // Try to reconnect every 30 seconds
        setInterval(function() {
            if (navigator.onLine) {
                window.location.reload();
            }
        }, 30000);
    </script>
</body>
</html>
