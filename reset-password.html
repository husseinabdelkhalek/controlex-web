<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إعادة تعيين كلمة المرور</title>
    <link rel="stylesheet" href="/css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div class="auth-container">
        <div class="auth-card">
            <h1 class="auth-title">إعادة تعيين كلمة المرور</h1>
            <p>أدخل كلمة المرور الجديدة</p>
            
            <form id="reset-form" class="auth-form">
                <!-- حقل الكود المخفي -->
                <input type="hidden" id="token" name="verification-code" value="">
                
                <div class="form-group">
                    <label for="password" class="form-label">كلمة المرور الجديدة:</label>
                    <div class="password-input-group">
                        <input type="password" id="password" name="password" class="form-input" 
                               placeholder="أدخل كلمة المرور الجديدة" required minlength="6">
                        <button type="button" class="password-toggle" onclick="togglePasswordVisibility('password')">
                            <i id="password-icon" class="fas fa-eye"></i>
                        </button>
                    </div>
                </div>
                
                <div class="form-group">
                    <label for="confirm-password" class="form-label">تأكيد كلمة المرور:</label>
                    <div class="password-input-group">
                        <input type="password" id="confirm-password" name="confirm-password" class="form-input" 
                               placeholder="أعد إدخال كلمة المرور" required minlength="6">
                        <button type="button" class="password-toggle" onclick="togglePasswordVisibility('confirm-password')">
                            <i id="confirm-password-icon" class="fas fa-eye"></i>
                        </button>
                    </div>
                </div>
                
                <button type="submit" class="btn btn-primary">
                    <i class="fas fa-key"></i>
                    تغيير كلمة المرور
                </button>
                
                <div id="form-message" class="form-message"></div>
            </form>
            
            <div class="auth-links">
                <a href="/" class="auth-link">العودة لتسجيل الدخول</a>
            </div>
        </div>
    </div>
    
    <script>
        // تحميل البيانات من الـ URL
        document.addEventListener('DOMContentLoaded', function() {
            const urlParams = new URLSearchParams(window.location.search);
            const email = urlParams.get('email');
            const code = urlParams.get('code');
            
            // تعيين الكود في الحقل المخفي
            if (code) {
                document.getElementById('token').value = code;
            }
            
            // طباعة للتأكد (يمكن حذفها لاحقاً)
            console.log('Email:', email);
            console.log('Code:', code);
        });
        
        // وظيفة إظهار/إخفاء كلمة المرور
        function togglePasswordVisibility(inputId) {
            const input = document.getElementById(inputId);
            const icon = document.getElementById(inputId + '-icon');
            
            if (input.type === 'password') {
                input.type = 'text';
                icon.className = 'fas fa-eye-slash';
            } else {
                input.type = 'password';
                icon.className = 'fas fa-eye';
            }
        }
    </script>
    
    <script src="/js/forgot-reset.js"></script>
</body>
</html>
