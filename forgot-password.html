   <title>⚡️ 𝒞𝑜𝓃𝓉𝓇𝑜𝓁𝑒𝓍 ⚙️ – 𝐹𝒪𝑅𝒢𝐸𝒯 𝒫𝒜𝒮𝒮 ⏳</title>

<link rel="stylesheet" href="/css/style.css">
<link rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.rtl.min.css"
      integrity="sha384-Xbg45MqvDIk1e563NLpGEulpX6AvL404DP+/iCgW9eFa2BqztiwTexswJo2jLMue"
      crossorigin="anonymous">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA==" crossorigin="anonymous" referrerpolicy="no-referrer" />


    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="auth-container">
        <div class="auth-card animated-card">
            <h2>نسيت كلمة المرور؟</h2>
            <p>لا تقلق. أدخل بريدك الإلكتروني وسنرسل لك كود إعادة التعيين.</p>
            <form id="forgot-form">
                <div class="form-group">
                    <label for="email">البريد الإلكتروني</label>
                    <input type="email" id="email" required>
                </div>
                <div id="form-message" class="form-message"></div>
                <button type="submit" class="btn btn-primary">إرسال كود إعادة التعيين</button>
            </form>
            <p><a href="/">العودة لتسجيل الدخول</a></p>
        </div>
    </div>
    <script src="/js/forgot-reset.js"></script>
</body>
</html>
